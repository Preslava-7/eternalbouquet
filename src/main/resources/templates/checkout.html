<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

<header>
    <div><b>🌸 Eternal Bouquet</b></div>
</header>

<h2>Checkout</h2>

<div class="checkout-container">

    <!-- TOTAL -->
    <div class="summary">
        <h3>Total price:</h3>
        <p th:text="${cart.totalPrice} + ' €'"></p>
    </div>

    <!-- FORM -->
    <form th:action="@{/checkout}"
          th:object="${checkoutRequest}"
          method="post">

        <label>Delivery address</label>

        <input type="text"
               th:field="*{deliveryAddress}"
               placeholder="Enter address"
               required/>

        <button type="submit">
            Place Order
        </button>

    </form>

</div>

</body>
</html>
