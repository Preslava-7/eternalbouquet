<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml"><head><meta charset="UTF-8">
    <link rel="stylesheet" href="/css/style.css">
    <title>Bouquet Details</title>
    </head>
<body>

<div th:replace="fragments/header :: siteHeader"></div>

<div class="bouquet-details-container">

    <div class="card bouquet-details-card" th:object="${bouquet}">

        <img th:src="${bouquet.imageUrl}" alt="Bouquet">

        <div class="card-content">
            <h3>
                <a th:href="@{/bouquets/{id}(id=${bouquet.id})}" th:text="${bouquet.name}"></a>
            </h3>

            <p class="price" th:text="${bouquet.price + ' €'}"></p>

            <p>
                Average rating:
                <span th:text="${averageRating}"></span> ⭐
            </p>

            <div class="button-group">
                <form th:action="@{/cart/add/{id}(id=${bouquet.id})}" method="post">
                    <button class="buy-btn" type="submit">
                        Add to cart
                    </button>
                </form>

                <form th:action="@{/favorites/add/{id}(id=${bouquet.id})}" method="post">
                    <button class="favorite-btn" type="submit">
                        ❤
                    </button>
                </form>

                <form th:if="${session.isAdmin}"
                      th:action="@{/bouquets/edit/{id}(id=${bouquet.id})}"
                      method="get">
                    <button class="edit-btn" type="submit">Edit</button>
                </form>
            </div>
        </div>

        <p th:if="${error}" th:text="${error}" style="color:red;"></p>
        <p th:if="${success}" th:text="${success}" style="color:green;"></p>
    </div>

</div>
<form th:action="@{/bouquets/{id}/reviews/add(id=${bouquet.id})}"
      method="post"
      th:object="${reviewDto}">

    <input type="hidden"
           name="bouquetId"
           th:value="${bouquet.id}">

    <div class="star-rating">

        <input type="radio" th:field="*{rating}" id="star5" value="5">
        <label for="star5">★</label>

        <input type="radio" th:field="*{rating}" id="star4" value="4">
        <label for="star4">★</label>

        <input type="radio" th:field="*{rating}" id="star3" value="3">
        <label for="star3">★</label>

        <input type="radio" th:field="*{rating}" id="star2" value="2">
        <label for="star2">★</label>

        <input type="radio" th:field="*{rating}" id="star1" value="1">
        <label for="star1">★</label>

    </div>

    <textarea th:field="*{comment}"></textarea>

    <button type="submit">
        Submit Review
    </button>

</form>

<div class="reviews">

    <h3>Reviews</h3>

    <div th:each="r : ${reviews}" class="review-card">

        <p th:text="${r.rating} + ' ⭐'"></p>
        <p th:text="${r.comment}"></p>

    </div>

</div>
</body></html>
