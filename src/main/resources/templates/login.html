<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" type="text/css" href="/css/style.css">
</head>
<body>

<header>
    <div><b>🌸 Eternal Bouquet</b></div>
</header>

<div class="login-container">

    <h1>Login</h1>

    <form th:action="@{/login}" method="post" th:object="${userLoginRequest}">

        <div class="form-group">
            <label>Email</label>
            <input type="email"
                   th:field="*{email}"
                   placeholder="Enter your email">
            <p class="alert-warning" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>


        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password"
                   th:field="*{password}"
                   placeholder="Enter your password">
            <p class="alert-warning" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
        </div>

        <button type="submit">
            Login
        </button>

        <div class="auth-footer">
            <p>
                Don't have an account?
                <a th:href="@{/register}" class="register-link">Register here</a>
            </p>
        </div>

    </form>

</div>

</body>
</html>
