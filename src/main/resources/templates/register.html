<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header>
    <div><b>🌸 Eternal Bouquet</b></div>
</header>

<div class="register-container">

    <h1>Create Account</h1>

    <form th:action="@{/register}"
          method="post"
          th:object="${userRegisterRequest}">

        <div class="form-group">
            <label>Username</label>
            <input type="text"
                   th:field="*{username}">
            <p class="alert-warning" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email"
                   th:field="*{email}">
            <p class="alert-warning" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password"
                   th:field="*{password}">
            <p class="alert-warning" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
        </div>

        <button type="submit">
            Register
        </button>

    </form>

</div>

</body>
</html>
